name: daily-contribution

# Keeps sagar21-creator's contribution graph green: 3 keep-alive commits/day,
# authored by the account's linked no-reply so they count on its graph. Runs on
# GitHub's runners (no local machine needed). Trigger manually any time via the
# "Run workflow" button (workflow_dispatch).
on:
  schedule:
    - cron: '23 5 * * *'    # ~05:23 UTC daily (GitHub cron is best-effort)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-contribution
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Three keep-alive commits as sagar21-creator
        run: |
          set -e
          git config user.name  "sagar21-creator"
          git config user.email "55117902+sagar21-creator@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          for i in 1 2 3; do
            git commit --allow-empty -m "chore(streak): daily keep-alive $(date -u +%F) #$i [skip ci]"
          done
          git push origin "HEAD:${GITHUB_REF_NAME}"
